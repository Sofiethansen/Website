<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copenhagen Events</title>
    <link rel="stylesheet" href="style.css" />
  </head>
 <body>

  <!-- Hamburger Menu -->
  <div class="menu-icon" onclick="toggleMenu()">☰</div>

  <div class="sidebar" id="sidebar">
    <a href="#"> Information</a>
    <a href="#"> Map</a>
    <a href="/joined.html">Your Events</a>
    <a href="#"> Profile</a>
    <a href="#" onclick="openLoginModal()"> Login</a>
  </div>

  <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
  <!-- Login/Signup Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal()"></div>

<div class="modal" id="auth-modal">
  <h2 id="modal-title">Login</h2>

  <input type="text" id="auth-username" placeholder="Username" />
  <input type="password" id="auth-password" placeholder="Password" />

  <button class="submit-btn" onclick="submitAuth()">Continue</button>
  <p class="switch-auth">Don't have an account? <span onclick="switchMode()">Sign up</span></p>
  <p id="auth-error" style="color: red; font-size: 13px;"></p>
</div>

<!-- Profile icon (hidden until logged in) -->
<div class="profile-icon" id="profile-icon" style="display:none" onclick="toggleProfileMenu()">
  <span id="profile-initial">S</span>
</div>

<div class="profile-menu" id="profile-menu" style="display:none">
  <p id="profile-username"></p>
  <button onclick="logout()">Log out</button>
</div>

  <!-- Main content -->
  <h1>Creative Events in Copenhagen</h1>
  <p class="subtitle">Discover creative events and meet new people</p>
  <h2 class="section-title">Events coming up</h2>
<div class="create-section">
  <button class="create-btn" onclick="toggleForm()">+ Create Event</button>

  <div class="create-form" id="create-form">
    <h2>Create a new event</h2>
    <input type="text" id="input-title" placeholder="Event title" />
    <input type="date" id="input-date" />
    <input type="text" id="input-location" placeholder="Location" />
    <input type="text" id="input-category" placeholder="Category (e.g. Music, Art)" />
    <textarea id="input-description" placeholder="Describe your event..."></textarea>
    <input type="file" id="input-photo" accept="image/*" />
    <button class="submit-btn" onclick="submitEvent()">Add Event</button>
  </div>
</div>
  <div class="events-layout">
    <div id="joined-events-panel" style="display:none; max-width:600px; margin: 40px auto; padding: 0 20px;">
  <h2 style="color:#27500a; border-bottom: 2px solid #c0dd97; padding-bottom:8px;">Your Joined Events</h2>
  <div id="joined-events-container"></div>
</div>
  <div class="events-column">
    <h3>All Events</h3>
    <div id="events-container"></div>
  </div>
  <div class="events-column">
    <h3>My Events</h3>
    <div id="my-events-container"></div>
  </div>
</div>

  <script src="script.js"></script>
</body>
</html>
